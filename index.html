<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 남은 시간 계산기</title>
    <style>
        /* 깔끔하고 현대적인 미니멀리즘 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .current-time {
            font-size: 0.9rem;
            color: #868e96;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 2.5rem;
        }

        input[type="datetime-local"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="datetime-local"]:focus {
            border-color: #495057;
        }

        .result-box {
            background-color: #f1f3f5;
            padding: 2rem 1rem;
            border-radius: 12px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hours-display {
            font-size: 2.2rem;
            font-weight: 800;
            color: #228be6; /* 포인트를 줄 깔끔한 블루 톤 */
            line-height: 1.2;
        }

        .unit {
            font-size: 1rem;
            font-weight: 500;
            color: #495057;
            margin-top: 0.5rem;
        }

        .message {
            color: #868e96;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⏳ TIME LEFT</h1>
        <div class="current-time" id="currentTime">현재 시간: 로딩 중...</div>

        <!-- 목표 날짜 입력창 -->
        <div class="input-group">
            <input type="datetime-local" id="targetDate" onchange="startTimer()">
        </div>

        <!-- 결과 출력 레이아웃 -->
        <div class="result-box">
            <div id="resultContainer">
                <div class="message">목표 날짜와 시간을 선택해주세요.</div>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;

        // 1. 현재 시간을 실시간(초 단위)으로 상단에 업데이트
        function updateCurrentTime() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('currentTime').innerText = `현재 시간: ${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
        }
        
        setInterval(updateCurrentTime, 1000);
        updateCurrentTime(); // 최초 실행

        // 2. 무조건 '시간(Hours)' 단위로만 남은 시간 계산하는 로직
        function calculateHours() {
            const targetInput = document.getElementById('targetDate').value;
            const resultContainer = document.getElementById('resultContainer');

            if (!targetInput) return;

            const now = new Date();
            const target = new Date(targetInput);
            
            // 두 날짜의 차이를 밀리초(ms) 단위로 계산
            const diffMs = target - now;

            if (diffMs <= 0) {
                resultContainer.innerHTML = `<div class="message" style="color: #fa5252;">이미 지나간 날짜입니다.</div>`;
                clearInterval(timerInterval);
                return;
            }

            // 밀리초를 '총 시간' 소수점으로 변환 (1초 = 1000ms, 1시간 = 3600초)
            const totalHours = diffMs / (1000 * 60 * 60);

            // UI 업데이트 (소수점 둘째 자리까지 표시)
            resultContainer.innerHTML = `
                <div class="hours-display">${totalHours.toFixed(2)} 시간</div>
                <div class="unit">남았습니다</div>
            `;
        }

        // 3. 인풋 값이 바뀌면 실시간 타이머 가동
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            calculateHours(); // 즉시 한 번 실행
            timerInterval = setInterval(calculateHours, 100); // 0.1초마다 부드럽게 갱신
        }
    </script>
</body>
</html>
